name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: deadnix (unused code)
        run: nix run nixpkgs#deadnix -- --fail .
      - name: statix (anti-patterns)
        run: nix run nixpkgs#statix -- check .
      - name: alejandra (formatting)
        run: nix run nixpkgs#alejandra -- --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Guard tests
        run: |
          result=$(nix eval .#tests.summary --json)
          echo "$result"
          total=$(echo "$result" | jq .total)
          passed=$(echo "$result" | jq .passed)
          if [ "$total" != "$passed" ]; then
            echo "FAIL: $passed/$total tests passed"
            exit 1
          fi
          echo "OK: $passed/$total tests passed"

  build-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - hm-x86_64-linux
          - hm-wsl-x86_64-linux
          - hm-nixos-x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.target }}
        run: nix build .#homeConfigurations.${{ matrix.target }}.activationPackage --dry-run
